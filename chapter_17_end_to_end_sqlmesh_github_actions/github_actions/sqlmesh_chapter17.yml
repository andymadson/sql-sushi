name: SQLMesh Chapter 17

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  sqlmesh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r requirements-dev.txt \
            -r chapter_12_scheduling_sql_pipelines_python/requirements.txt \
            -r chapter_17_end_to_end_sqlmesh_github_actions/requirements.txt

      - name: Run Chapter 17 SQLMesh pipeline
        run: |
          python chapter_17_end_to_end_sqlmesh_github_actions/scripts/run_pipeline.py
