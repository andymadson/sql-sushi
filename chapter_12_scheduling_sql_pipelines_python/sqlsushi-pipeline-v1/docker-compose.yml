services:
  postgres:
    # Pinned to a specific patch so the chapter is reproducible. Bump
    # this when you bump the chapter's tooling table.
    image: postgres:17.10
    container_name: sqlsushi-postgres
    environment:
      POSTGRES_DB: ${PG_DATABASE:-sqlsushi}
      POSTGRES_USER: ${PG_USER:-sqlsushi}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-sqlsushi}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-sqlsushi} -d ${PG_DATABASE:-sqlsushi}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
