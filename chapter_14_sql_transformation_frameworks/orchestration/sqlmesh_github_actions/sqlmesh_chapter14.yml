name: SQLMesh Chapter 14

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  sqlmesh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r requirements-dev.txt \
            -r chapter_12_scheduling_sql_pipelines_python/requirements.txt \
            -r chapter_14_sql_transformation_frameworks/requirements.txt

      - name: Run SQLMesh path
        run: |
          python chapter_14_sql_transformation_frameworks/scripts/run_sqlmesh_path.py
