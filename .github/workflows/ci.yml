name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR or branch to save Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python and parse SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.13 sqlglot==30.6.0

      - name: Lint Python with ruff
        shell: bash
        run: |
          if compgen -G "chapter_*" > /dev/null; then
            ruff check chapter_*/
          else
            echo "No chapter_* directories yet; skipping ruff check."
          fi

      - name: Parse SQL files with sqlglot (Postgres dialect)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find . -name "*.sql" \
            -not -path "./.venv/*" -not -path "*/node_modules/*" -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No SQL files found; skipping."
            exit 0
          fi
          rc=0
          for f in "${files[@]}"; do
            if ! python3 -c "import sys, sqlglot; sqlglot.parse(open(sys.argv[1]).read(), dialect='postgres')" "$f"; then
              echo "::error file=$f::sqlglot failed to parse $f"
              rc=1
            fi
          done
          exit "$rc"
