name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR or branch to save Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chapter-12:
    name: Hands-on chapter baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Java for Spark
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r chapter_12_scheduling_sql_pipelines_python/requirements.txt -r chapter_13_workflow_orchestration/requirements.txt -r chapter_14_sql_transformation_frameworks/requirements.txt -r chapter_15_beyond_sql_spark/requirements.txt -r chapter_16_real_time_data_transformation/requirements.txt

      - name: Lint Python with ruff
        run: ruff check chapter_12_scheduling_sql_pipelines_python chapter_13_workflow_orchestration chapter_14_sql_transformation_frameworks chapter_15_beyond_sql_spark chapter_16_real_time_data_transformation

      - name: Parse SQL files with sqlglot (DuckDB dialect)
        run: |
          python - <<'PY'
          import pathlib
          import sys

          import sqlglot

          failures = []
          for path in pathlib.Path("chapter_12_scheduling_sql_pipelines_python/sql").rglob("*.sql"):
              try:
                  sqlglot.parse(path.read_text(encoding="utf-8"), dialect="duckdb")
              except Exception as exc:
                  failures.append((path, exc))

          for path, exc in failures:
              print(f"::error file={path}::sqlglot failed to parse {path}: {exc}")

          sys.exit(1 if failures else 0)
          PY

      - name: Run Chapter 12 end to end
        run: |
          python chapter_12_scheduling_sql_pipelines_python/scripts/build_seed_data.py
          python chapter_12_scheduling_sql_pipelines_python/scripts/generate_data.py
          python chapter_12_scheduling_sql_pipelines_python/scripts/runner.py
          python chapter_12_scheduling_sql_pipelines_python/scripts/verify_counts.py

      - name: Run Chapter 13 scheduled wrapper
        run: |
          python chapter_13_workflow_orchestration/scripts/run_scheduled_pipeline.py --log-file chapter_13_workflow_orchestration/logs/ci-scheduled-run.log

      - name: Run Chapter 14 dbt build
        run: |
          python chapter_14_sql_transformation_frameworks/scripts/prepare_raw_data.py
          dbt run --project-dir chapter_14_sql_transformation_frameworks/dbt --profiles-dir chapter_14_sql_transformation_frameworks/dbt
          dbt test --project-dir chapter_14_sql_transformation_frameworks/dbt --profiles-dir chapter_14_sql_transformation_frameworks/dbt
          python chapter_14_sql_transformation_frameworks/scripts/verify_framework_counts.py --label dbt

      - name: Run Chapter 14 SQLMesh build
        run: |
          python chapter_14_sql_transformation_frameworks/scripts/prepare_raw_data.py
          sqlmesh -p chapter_14_sql_transformation_frameworks/sqlmesh plan --auto-apply --no-prompts
          python chapter_14_sql_transformation_frameworks/scripts/verify_framework_counts.py --label sqlmesh

      - name: Run Chapter 15 Spark basket pairs
        run: |
          python chapter_15_beyond_sql_spark/scripts/prepare_spark_inputs.py
          python chapter_15_beyond_sql_spark/scripts/build_basket_pairs.py
          python chapter_15_beyond_sql_spark/scripts/verify_basket_pairs.py

      - name: Run Chapter 16 real-time micro-batches
        run: |
          python chapter_16_real_time_data_transformation/scripts/prepare_event_batches.py
          python chapter_16_real_time_data_transformation/scripts/run_micro_batches.py --reset
          python chapter_16_real_time_data_transformation/scripts/run_micro_batches.py
          python chapter_16_real_time_data_transformation/scripts/verify_real_time_outputs.py
